kratos:
  development: true
  automigration:
    enabled: true
    type: job
  config:
    serve:
      public:
        base_url: http://localhost:4433/
        cors:
          enabled: true
      admin:
        base_url: http://localhost:4434/
    dsn: "postgres://mysaas:mysaas-dev@postgres-postgresql.ory.svc.cluster.local:5432/mysaas?sslmode=disable&search_path=kratos"
    identity:
      default_schema_id: user
      schemas:
        - id: user
          url: base64:
    courier:
      smtp:
        connection_uri: "smtp://mailhog-mailhog.ory.svc.cluster.local:1025/?disable_starttls=true"
    selfservice:
      default_browser_return_url: http://localhost:3000/
      flows:
        registration:
          enabled: true
          ui_url: http://localhost:3000/registration
        login:
          ui_url: http://localhost:3000/login
        settings:
          ui_url: http://localhost:3000/settings
    session:
      lifespan: 24h

secret:
  enabled: true

service:
  admin:
    type: LoadBalancer
    port: 4434
  public:
    type: LoadBalancer
    port: 4433