hydra:
  dev: true
  automigration:
    enabled: true
    type: job
  config:
    serve:
      public:
        cors:
          enabled: true
      admin:
        cors:
          enabled: true
    dsn: "postgres://mysaas:mysaas-dev@postgres-postgresql.ory.svc.cluster.local:5432/mysaas?sslmode=disable&search_path=hydra"
    urls:
      self:
        issuer: http://localhost:4444/
      login: http://localhost:3000/login
      consent: http://localhost:3000/consent
      logout: http://localhost:3000/
    secrets:
      system:
        - "supersecret-please-change-in-production-32chars"
    oidc:
      subject_identifiers:
        supported_types:
          - public
          - pairwise
        pairwise:
          salt: "another-super-secret-salt-please-change"
    oauth2:
      expose_internal_errors: false

secret:
  enabled: true

service:
  public:
    type: LoadBalancer
  admin:
    type: LoadBalancer